name: health_pipeline
version: "1.0.0"
config-version: 2

profile: health_pipeline

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  health_pipeline:
    staging:
      +materialized: view
      +schema: staging
      strava:
        +tags: ["strava", "staging"]
      garmin:
        +tags: ["garmin", "staging"]
    intermediate:
      +materialized: view
      +schema: intermediate
      garmin:
        +tags: ["garmin", "intermediate"]
    marts:
      +materialized: table
      +schema: marts
